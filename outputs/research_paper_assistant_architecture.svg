<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="System architecture diagram">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#152238" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.4; filter: url(#shadow); }
      .soft { fill: #f8fafc; stroke: #d9e1ec; stroke-width: 1.4; filter: url(#shadow); }
      .lane-basic { fill: #ecfdf5; stroke: #bbf7d0; stroke-width: 1.5; filter: url(#shadow); }
      .lane-advanced { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; filter: url(#shadow); }
      .output { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.5; filter: url(#shadow); }
      .h1 { font: 700 24px Arial, Helvetica, sans-serif; fill: #172033; letter-spacing: 0; }
      .h2 { font: 700 18px Arial, Helvetica, sans-serif; fill: #172033; letter-spacing: 0; }
      .text { font: 400 15px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #52637a; letter-spacing: 0; }
      .line { fill: none; stroke: #334155; stroke-width: 2.3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <rect x="80" y="60" width="1440" height="80" rx="8" class="panel"/>
  <text class="h2" x="112" y="94">Shared contracts</text>
  <text class="text" x="112" y="121">PaperRecord -> ParsedPaper -> Recommendation -> RagEvidencePack -> AnalysisResult</text>

  <rect x="80" y="200" width="260" height="118" rx="8" class="panel"/>
  <text class="h2" x="112" y="238">Topic input</text>
  <text class="text" x="112" y="267">Keywords, abstract,</text>
  <text class="text" x="112" y="291">or research idea</text>

  <rect x="80" y="364" width="260" height="118" rx="8" class="panel"/>
  <text class="h2" x="112" y="402">PDF input</text>
  <text class="text" x="112" y="431">Uploaded paper</text>
  <text class="text" x="112" y="455">with sections and references</text>

  <rect x="420" y="190" width="470" height="548" rx="8" class="lane-basic"/>
  <text class="h1" x="452" y="232">Basic techniques</text>

  <rect x="452" y="270" width="184" height="104" rx="8" class="panel"/>
  <text class="h2" x="478" y="304">Preprocessing</text>
  <text class="small" x="478" y="332">cleaning</text>
  <text class="small" x="478" y="354">normalization</text>

  <rect x="674" y="270" width="184" height="104" rx="8" class="panel"/>
  <text class="h2" x="700" y="304">Lexical search</text>
  <text class="small" x="700" y="332">TF-IDF</text>
  <text class="small" x="700" y="354">BM25</text>

  <rect x="452" y="420" width="184" height="126" rx="8" class="panel"/>
  <text class="h2" x="478" y="454">PDF NLP</text>
  <text class="small" x="478" y="482">section parsing</text>
  <text class="small" x="478" y="504">POS / NER</text>
  <text class="small" x="478" y="526">keyphrases</text>

  <rect x="674" y="420" width="184" height="126" rx="8" class="panel"/>
  <text class="h2" x="700" y="454">Baselines</text>
  <text class="small" x="700" y="482">TF-IDF features</text>
  <text class="small" x="700" y="504">LogReg / SVM</text>
  <text class="small" x="700" y="526">domain labels</text>

  <rect x="524" y="604" width="250" height="78" rx="8" class="panel"/>
  <text class="h2" x="550" y="638">Basic signals</text>
  <text class="small" x="550" y="664">clean records, entities, scores</text>

  <rect x="1010" y="190" width="510" height="548" rx="8" class="lane-advanced"/>
  <text class="h1" x="1042" y="232">Advanced techniques</text>

  <rect x="1042" y="270" width="190" height="104" rx="8" class="panel"/>
  <text class="h2" x="1068" y="304">Embeddings</text>
  <text class="small" x="1068" y="332">SPECTER2 / SciNCL</text>
  <text class="small" x="1068" y="354">semantic similarity</text>

  <rect x="1280" y="270" width="208" height="104" rx="8" class="panel"/>
  <text class="h2" x="1306" y="304">RAG evidence</text>
  <text class="small" x="1306" y="332">retrieved snippets</text>
  <text class="small" x="1306" y="354">source attribution</text>

  <rect x="1042" y="420" width="190" height="126" rx="8" class="panel"/>
  <text class="h2" x="1068" y="454">Hybrid ranker</text>
  <text class="small" x="1068" y="482">lexical + semantic</text>
  <text class="small" x="1068" y="504">section-aware score</text>
  <text class="small" x="1068" y="526">recency / category</text>

  <rect x="1280" y="420" width="208" height="126" rx="8" class="panel"/>
  <text class="h2" x="1306" y="454">Local LLM</text>
  <text class="small" x="1306" y="482">grounded synthesis</text>
  <text class="small" x="1306" y="504">self-verification</text>
  <text class="small" x="1306" y="526">LoRA workflow</text>

  <rect x="1136" y="604" width="260" height="78" rx="8" class="panel"/>
  <text class="h2" x="1162" y="638">Advanced reasoning</text>
  <text class="small" x="1162" y="664">recommendations, gaps, critique</text>

  <rect x="566" y="790" width="690" height="80" rx="8" class="output"/>
  <text class="h2" x="598" y="824">Final output</text>
  <text class="text" x="598" y="850">summary, findings, research gaps, recommendations, citations, peer review</text>

  <path class="line" d="M 340 259 C 382 259, 390 300, 420 322"/>
  <path class="line" d="M 340 423 C 382 430, 390 456, 420 482"/>
  <path class="line" d="M 636 322 H 674"/>
  <path class="line" d="M 636 483 H 674"/>
  <path class="line" d="M 774 643 C 842 643, 930 519, 1010 483"/>
  <path class="line" d="M 858 322 C 904 322, 946 322, 1010 322"/>
  <path class="line" d="M 1232 322 H 1280"/>
  <path class="line" d="M 1232 483 H 1280"/>
  <path class="line" d="M 1384 546 C 1384 578, 1384 586, 1396 620"/>
  <path class="line" d="M 1266 682 C 1208 752, 1132 790, 1056 790"/>
  <path class="line" d="M 774 682 C 806 742, 842 770, 886 790"/>
</svg>
